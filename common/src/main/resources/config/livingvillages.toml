# Living Villages Configuration
# 修改后需重启客户端/服务端生效。

[world]
# 聚落数量（0 = 自动: 原版村庄总数 ÷ villages_per_cluster）
cluster_count = 0

# 每个聚落的村庄数（决定了聚落数量 K）
villages_per_cluster = 7

[cluster]
# 聚落最大半径 (blocks)，卫星村会被拉到离中心这个距离之内
cluster_radius = 320

# 村庄间最小间距 (blocks)
min_separation = 96

[graph]
# 路网连接度（每个聚落连接几个最近邻居）
knn_degree = 2

[road]
# 道路宽度 (blocks)
road_width = 3

# 道路材料（Minecraft 方块 ID）
road_material = "minecraft:stone_bricks"

[economy]
# 每日 tick 间隔（24000 = 1 个 Minecraft 日）
daily_tick_interval = 24000

# 同时存在的最大商队数
max_caravans = 20
