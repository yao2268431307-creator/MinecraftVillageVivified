# Living Villages Configuration
# 此文件由模组自动生成，修改后需重启客户端/服务端生效。
#
# 所有参数均有范围限制，超出范围的值将导致模组回退到默认值并记录警告日志。
# 详细说明请参考模组文档。

[kcenter]
# 聚落中心数量。较大的值产生更多聚落群，每个群较小。
# 范围: [2, 50], 默认: 8
K = 8

# 聚落内村庄最大散布半径 (blocks)。较大的值让村庄分布更松散。
# 范围: [800, 6400], 默认: 3200
R_cluster = 3200

# 村庄间最小距离 (blocks)。防止两个村庄离得太近。
# 范围: [32, 512], 默认: 96
min_separation = 96

[cluster]
# DBSCAN 邻域半径 (blocks)。超过此距离的村庄不会被归为同一聚落。
# 范围: [100, 500], 默认: 250
eps = 250

# DBSCAN 最小点数。固定为 1（允许孤立村庄形成单成员聚落）。
minPts = 1

[graph]
# KNN 图连接度。每个聚落连接到的最近邻居数。
# 范围: [1, 5], 默认: 2
knn_k = 2

# A* 最大坡度 (Δy / 水平距离)。超过此坡度的路径会被惩罚。
# 范围: [0.1, 3.0], 默认: 1.0
max_slope = 1.0

# 隧道挖掘深度阈值 (blocks)。路径上方固体方块超过此深度 → 挖隧道。
# 范围: [3, 20], 默认: 6
tunnel_threshold = 6

[economy]
# CES 生产函数替代弹性。值越接近 1，供给对价格越敏感。
# 范围: [0.01, 0.99], 默认: 0.7
ces_elasticity = 0.7

# 价格热扩散系数。值越大，聚落间价格均衡越快。
# 范围: [0.01, 1.0], 默认: 0.15
diffusion_rate = 0.15

# 每日 tick 间隔 (游戏刻)。24000 = 一个 Minecraft 日。
daily_tick_interval = 24000

[caravan]
# 煤矿车燃料持续时间 (ticks)。20 ticks = 1 秒。
# 范围: [100, 72000], 默认: 1200
fuel_ticks = 1200

# 最大活跃商队数。超过此数量不再 spawn 新商队。
# 范围: [1, 500], 默认: 50
max_active_caravans = 50
